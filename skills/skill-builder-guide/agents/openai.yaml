interface:
  display_name: "L1-meta — Skill Builder Guide"
  short_description: "L1-meta — AI Agent Skills 创建管线。分析→扫描→生成→验证→确认。双轴分级、技能模板、验证协议、打包分发。"
  default_prompt: "Use skill-builder-guide to create or evaluate AI Agent Skills for a project. This is a META skill — its output is new skill files."
policy:
  allow_implicit_invocation: false
triggers:
  - 创建技能
  - 技能模板
  - 模型分级
  - L0 下放
  - 技能验证
  - Skills 体系
  - 技能打包
  - 技能目录
  - skill builder
  - openai.yaml
  - frontmatter
  - 双轴分级
  - 生成专属技能
