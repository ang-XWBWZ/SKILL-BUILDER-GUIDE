interface:
  display_name: "L0-atomic — example-code-map"
  short_description: "L0-atomic — 示例项目代码地图。文件定位、目录结构、组件导航。纯查表技能，必须由 Haiku 执行。"
  default_prompt: "Use example-code-map to find files, directories, and components in this project. This is an L0 skill — delegate to Haiku."
policy:
  allow_implicit_invocation: false
triggers:
  - 项目结构
  - 目录结构
  - 文件位置
  - 在哪开发
  - 组件位置
  - 页面在哪
  - 路由映射
